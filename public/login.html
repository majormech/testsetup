<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFD Supply · Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="login">
    <div class="shell slim">
      <section class="panel stack wide login-panel">
        <p class="eyebrow">DFD Supply</p>
        <h1>Badge + PIN Login</h1>
        <p class="subtitle">Scan your badge barcode or QR code, then enter your 4-digit PIN to open only the pages assigned to you.</p>
        <form id="login-form" class="stack compact">
          <label>Badge barcode / QR code
            <div class="input-with-action">
              <input id="login-badge-code" type="text" autocomplete="username" placeholder="Scan or type badge code" />
              <button type="button" class="secondary" id="scan-login-badge">Scan badge</button>
            </div>
          </label>
          <label>4-digit PIN
            <input id="login-pin" type="password" inputmode="numeric" maxlength="4" autocomplete="current-password" placeholder="1234" />
          </label>
          <button type="submit">Log In</button>
          <p id="login-message" class="helper"></p>
        </form>
      </section>
    </div>
    <div id="toast"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
