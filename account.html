<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFD Supply · Account Settings</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="account">
    <div class="shell slim">
      <section class="panel stack wide">
        <p class="eyebrow">DFD Supply</p>
        <h1>Account Settings</h1>
        <p class="subtitle">Update your 4-digit PIN here. Badge codes and page assignments are managed by an account manager.</p>
        <div class="account-summary">
          <p><strong>Username:</strong> <span id="account-username"></span></p>
          <p><strong>Badge code:</strong> <span id="account-badge"></span></p>
          <p class="helper hidden" id="account-pin-notice"></p>
        </div>
        <form id="account-pin-form" class="stack compact">
          <label>Current PIN
            <input type="password" name="currentPin" inputmode="numeric" maxlength="4" autocomplete="current-password" />
          </label>
          <label>New PIN
            <input type="password" name="newPin" inputmode="numeric" maxlength="4" autocomplete="new-password" />
          </label>
          <label>Confirm new PIN
            <input type="password" name="confirmPin" inputmode="numeric" maxlength="4" autocomplete="new-password" />
          </label>
          <button type="submit">Save New PIN</button>
        </form>
      </section>
      <section class="panel stack wide">
        <h2>Your Assigned Pages</h2>
        <ul id="account-pages" class="howto-toc"></ul>
      </section>
    </div>
    <div id="toast"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
